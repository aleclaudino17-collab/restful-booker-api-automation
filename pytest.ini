[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    auth: Testes de autenticação
    crud: Testes de CRUD
    e2e: Testes end-to-end
    security: Testes de segurança
    smoke: Testes de smoke
